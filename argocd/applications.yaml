apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hummingbird
  namespace: argocd
spec:
  description: Hummingbird deployment stacks
  sourceRepos:
    - https://github.com/mpsean/hummingbird-deployment.git
  destinations:
    - namespace: hummingbird-api
      server: https://kubernetes.default.svc
    - namespace: hummingbird-admin
      server: https://kubernetes.default.svc
    - namespace: hummingbird-signin
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: devops-tools
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolume
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: storage.k8s.io
      kind: StorageClass

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hummingbird-api
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: api=pemapol/hummingbird-api
    argocd-image-updater.argoproj.io/api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/api.allow-tags: regexp:^\d+$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: hummingbird
  source:
    repoURL: https://github.com/mpsean/hummingbird-deployment.git
    targetRevision: master
    path: hummingbird-api/api
  destination:
    server: https://kubernetes.default.svc
    namespace: hummingbird-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hummingbird-admin
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: admin=pemapol/hummingbird-admin
    argocd-image-updater.argoproj.io/admin.update-strategy: newest-build
    argocd-image-updater.argoproj.io/admin.allow-tags: regexp:^\d+$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: hummingbird
  source:
    repoURL: https://github.com/mpsean/hummingbird-deployment.git
    targetRevision: master
    path: hummingbird-api/admin
  destination:
    server: https://kubernetes.default.svc
    namespace: hummingbird-admin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hummingbird-signin
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: api=pemapol/hummingbird-signin-api,frontend=pemapol/hummingbird-signin-frontend
    argocd-image-updater.argoproj.io/api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/api.allow-tags: regexp:^\d+$
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^\d+$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: hummingbird
  source:
    repoURL: https://github.com/mpsean/hummingbird-deployment.git
    targetRevision: master
    path: signin
  destination:
    server: https://kubernetes.default.svc
    namespace: hummingbird-signin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---

