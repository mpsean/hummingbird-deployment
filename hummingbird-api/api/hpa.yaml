apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hummingbird-api
  namespace: hummingbird-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hummingbird-api
  minReplicas: 6
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
