apiVersion: apps/v1
kind: Deployment
metadata:
  name: hummingbird-api
  namespace: hummingbird-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hummingbird-api
  template:
    metadata:
      labels:
        app: hummingbird-api
    spec:
      serviceAccountName: hummingbird-api
      containers:
        - name: api
          image: pemapol/hummingbird-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: ConnectionStrings__MasterConnection
              value: Host=postgres;Port=5432;Database=hummingbird_master;Username=$(DB_USER);Password=$(DB_PASS)
            - name: TenantDbTemplate
              value: Host=postgres;Port=5432;Database={db};Username=$(DB_USER);Password=$(DB_PASS)
            - name: AdminKey
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: admin-key
            - name: Kubernetes__Enabled
              value: "true"
            - name: Kubernetes__FrontendImage
              value: mpsean/hummingbird-frontend:latest
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret-key
            - name: Jwt__Issuer
              value: LoginApi
            - name: Jwt__Audience
              value: LoginApiUsers
---
apiVersion: v1
kind: Service
metadata:
  name: hummingbird-api
  namespace: hummingbird-api
spec:
  selector:
    app: hummingbird-api
  ports:
    - port: 5000
      targetPort: 5000
