apiVersion: apps/v1
kind: Deployment
metadata:
  name: hummingbird-frontend
  namespace: tenant-TENANT_SLUG
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hummingbird-frontend
  template:
    metadata:
      labels:
        app: hummingbird-frontend
    spec:
      containers:
        - name: frontend
          image: pemapol/hummingbird-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: API_URL
              # Cross-namespace FQDN: <service>.<namespace>.svc.cluster.local
              value: http://hummingbird-api.hummingbird-api.svc.cluster.local:5000
---
apiVersion: v1
kind: Service
metadata:
  name: hummingbird-frontend
  namespace: tenant-TENANT_SLUG
spec:
  selector:
    app: hummingbird-frontend
  ports:
    - port: 80
      targetPort: 80
