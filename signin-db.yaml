apiVersion: v1
kind: Service
metadata:
  name: signin-postgres-ext
  namespace: signin
spec:
  ports:
    - port: 5432
      targetPort: 5432
--- 
apiVersion: v1
kind: Endpoints
metadata:
  name: signin-postgres-ext  # Must match the Service name exactly
  namespace: signin
subsets:
  - addresses:
      - ip: 172.31.17.19  # REPLACE with your EC2 Public/Private IP
    ports:
      - port: 5432

