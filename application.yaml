apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-signin-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mpsean/hummingbird-deployment.git
    targetRevision: HEAD
    path: 
  destination:
    server: https://kubernetes.default.svc
    namespace: signin-frontend
    
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

    automated:
      prune: true
      selfHeal: true