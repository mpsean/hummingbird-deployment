apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hummingbird-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mpsean/hummingbird-deployment.git
    targetRevision: master
    path: argocd
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
