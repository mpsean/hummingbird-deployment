# ── Signin Frontend ───────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: signin-frontend
  namespace: hummingbird-signin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signin-frontend
  template:
    metadata:
      labels:
        app: signin-frontend
    spec:
      containers:
        - name: signin-frontend
          image: mpsean/hummingbird-signin-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: signin-frontend
  namespace: hummingbird-signin
spec:
  selector:
    app: signin-frontend
  ports:
    - port: 80
      targetPort: 80

---
# ── Traefik IngressRoute ──────────────────────────────────────────────────────

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: signin-route
  namespace: hummingbird-signin
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`signin.hmmbird.xyz`)
      kind: Rule
      services:
        - name: signin-frontend
          port: 80
          