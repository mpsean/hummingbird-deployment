apiVersion: v1
kind: Secret
metadata:
  name: signin-api-secrets
  namespace: signin
type: Opaque
# base64 encoded values — replace with your actual secrets
# echo -n "your-value" | base64
stringData:
  ConnectionStrings__DefaultConnection: "Host=signin-postgres-ext;Port=5432;Database=signin;Username=postgres;Password=1234"
  Jwt__SecretKey: "Maiprosocool"
  Jwt__Issuer: "SigninApi"
  Jwt__Audience: "SigninApiUsers"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signin-api-config
  namespace: signin
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:5000"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signin-api
  namespace: signin
  labels:
    app: signin-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: signin-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: signin-api
    spec:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "signin"
          effect: "NoSchedule"

      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: dedicated
                    operator: In
                    values:
                      - signin

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway  # DoNotSchedule causes FailedScheduling with few nodes
          labelSelector:
            matchLabels:
              app: signin-api

      containers:
        - name: signin-api
          image: pemapol/hummingbird-signin-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: signin-api-config
            - secretRef:
                name: signin-api-secrets

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: signin-api-svc
  namespace: signin
spec:
  selector:
    app: signin-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP  # Internal only — exposed via Ingress below

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: signin-api-hpa
  namespace: signin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: signin-api
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50